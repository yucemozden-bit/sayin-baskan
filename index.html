<section class="screen on" id="scr-title">
  <div class="backdrop">
    <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#060a15"/>
          <stop offset=".62" stop-color="#0a1226"/>
          <stop offset="1" stop-color="#0d1c2e"/>
        </linearGradient>
        <linearGradient id="bowl" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#0b1322"/>
          <stop offset="1" stop-color="#070d18"/>
        </linearGradient>
        <radialGradient id="pitchGlow" cx="50%" cy="100%" r="75%">
          <stop offset="0" stop-color="rgba(46,124,74,.34)"/>
          <stop offset=".55" stop-color="rgba(30,90,56,.12)"/>
          <stop offset="1" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
        <radialGradient id="lamp" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="rgba(255,244,205,.9)"/>
          <stop offset="1" stop-color="rgba(255,244,205,0)"/>
        </radialGradient>
      </defs>

      <rect width="1200" height="800" fill="url(#sky)"/>

      <!-- yıldızlar -->
      <g fill="#cfe0ff">
        <circle class="star" cx="120" cy="90" r="1.6" style="animation-delay:.2s"/>
        <circle class="star" cx="310" cy="150" r="1.1" style="animation-delay:1.1s"/>
        <circle class="star" cx="520" cy="70" r="1.4" style="animation-delay:2s"/>
        <circle class="star" cx="760" cy="120" r="1.2" style="animation-delay:.7s"/>
        <circle class="star" cx="940" cy="60" r="1.6" style="animation-delay:1.6s"/>
        <circle class="star" cx="1080" cy="170" r="1.1" style="animation-delay:2.4s"/>
        <circle class="star" cx="220" cy="230" r="1" style="animation-delay:2.9s"/>
        <circle class="star" cx="880" cy="240" r="1" style="animation-delay:.4s"/>
        <circle class="star" cx="1150" cy="100" r="1.3" style="animation-delay:1.3s"/>
        <circle class="star" cx="60" cy="180" r="1.2" style="animation-delay:1.9s"/>
      </g>

      <!-- saha parıltısı -->
      <rect x="0" y="430" width="1200" height="370" fill="url(#pitchGlow)"/>

      <!-- uzak şehir silüeti -->
      <g fill="#0a1020">
        <rect x="0" y="560" width="90" height="120"/><rect x="95" y="590" width="60" height="90"/>
        <rect x="1050" y="575" width="70" height="105"/><rect x="1125" y="600" width="75" height="80"/>
      </g>

      <!-- stadyum kâsesi silüeti -->
      <g>
        <path d="M150 560 Q600 400 1050 560 L1050 585 Q600 430 150 585 Z" fill="#0e1730"/>
        <path d="M150 585 Q600 430 1050 585 L1010 690 Q600 560 190 690 Z" fill="url(#bowl)"/>
        <g fill="rgba(212,169,64,.14)">
          <path d="M240 612 Q600 480 960 612 L960 622 Q600 492 240 622 Z"/>
          <path d="M260 640 Q600 512 940 640 L940 650 Q600 524 260 650 Z"/>
        </g>
        <ellipse cx="600" cy="700" rx="430" ry="46" fill="rgba(38,110,66,.20)"/>
        <rect x="170" y="690" width="860" height="110" fill="#05080f"/>
      </g>

      <!-- projektörler -->
      <g stroke="#131c31" stroke-width="7">
        <line x1="215" y1="562" x2="215" y2="440"/>
        <line x1="985" y1="562" x2="985" y2="440"/>
      </g>
      <g>
        <rect x="185" y="418" width="60" height="24" rx="4" fill="#0f1730"/>
        <rect x="955" y="418" width="60" height="24" rx="4" fill="#0f1730"/>
        <g fill="#ffe9ae">
          <circle cx="197" cy="430" r="3"/><circle cx="211" cy="430" r="3"/><circle cx="225" cy="430" r="3"/><circle cx="239" cy="430" r="3"/>
          <circle cx="967" cy="430" r="3"/><circle cx="981" cy="430" r="3"/><circle cx="995" cy="430" r="3"/><circle cx="1009" cy="430" r="3"/>
        </g>
        <circle class="flglow" cx="215" cy="430" r="46" fill="url(#lamp)"/>
        <circle class="flglow" cx="985" cy="430" r="46" fill="url(#lamp)" style="animation-delay:2.2s"/>

  <div class="vignette"></div>

  <div class="titlewrap">
    <!-- arma -->
    <div class="crest">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

        <path d="M50 26 l5.2 10.6 11.7 1.7 -8.4 8.2 2 11.6 -10.5 -5.5 -10.5 5.5 2 -11.6 -8.4 -8.2 11.7 -1.7 Z"
              fill="#d4a940"/>
        <circle cx="50" cy="68" r="9" fill="none" stroke="#d4a940" stroke-width="2"/>
        <path d="M50 61.5 l3.6 2.6 -1.4 4.2 h-4.4 l-1.4 -4.2 Z" fill="#d4a940"/>
      </svg>
    </div>
