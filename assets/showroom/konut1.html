<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tek Katlı Villa · 3D</title>
<style>
  :root { --gold:#e7c063; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; overflow:hidden; background:#0b1220; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }
  .hud { position:fixed; left:18px; top:16px; color:#fff; pointer-events:none; text-shadow:0 2px 8px rgba(0,0,0,.5); }
  .hud h1 { font-size:20px; letter-spacing:.5px; font-weight:800; }
  .hud .sub { font-size:12px; opacity:.75; margin-top:2px; letter-spacing:.3px; }
  .hint { position:fixed; left:18px; bottom:16px; color:#dfe6f0; font-size:12px; opacity:.7; text-shadow:0 1px 4px rgba(0,0,0,.5); }
  .panel { position:fixed; right:16px; top:16px; display:flex; flex-direction:column; gap:8px; }
  .btn {
    pointer-events:auto; cursor:pointer; user-select:none;
    background:rgba(18,26,42,.72); color:#eef2f8; border:1px solid rgba(231,192,99,.35);
    padding:9px 14px; border-radius:10px; font-size:13px; font-weight:600; letter-spacing:.2px;
    backdrop-filter:blur(6px); transition:all .15s ease; text-align:center; min-width:132px;
  }
  .btn:hover { border-color:var(--gold); background:rgba(28,38,58,.85); }
  .btn.active { background:var(--gold); color:#1a1207; border-color:var(--gold); }
  .loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; color:#cfe0ff; font-size:14px; letter-spacing:.5px; }
</style>
<style id="sb-sade">.hud .sub,.hint{display:none!important}</style>
</head>
<body>
<div id="app"></div>
<div class="hud">
  <h1>TEK KATLI VİLLA</h1>
  <div class="sub">Modern · Havuzlu · İnteraktif 3D</div>
</div>
<div class="panel">
  <div class="btn active" id="btnRotate">⟳ Otomatik dönüş</div>
  <div class="btn" id="btnTime">☀️ Gündüz</div>
  <div class="btn" id="btnReset">⤿ Görünümü sıfırla</div>
</div>
<div class="hint">Sürükle: döndür · Tekerlek / iki parmak: yakınlaş</div>
<div class="loading" id="loading">3D sahne yükleniyor…</div>

<script src="three.min.js"></script>
<script>
(function(){
  const holder = document.getElementById('app');
  const loading = document.getElementById('loading');
  if (!window.THREE) { loading.textContent = "3D kütüphanesi yüklenemedi (internet gerekli)."; return; }

  // ---------- Renderer ----------
  const renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.95;
  holder.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const DAY_BG = new THREE.Color(0x9ecbf0);
  const NIGHT_BG = new THREE.Color(0x0c1424);
  scene.background = DAY_BG.clone();
  scene.fog = new THREE.Fog(DAY_BG.clone(), 70, 175);

  const camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 0.1, 500);

  // ---------- Lights ----------
  const hemi = new THREE.HemisphereLight(0xc4d8ec, 0x47603c, 0.5);
  scene.add(hemi);
  const sun = new THREE.DirectionalLight(0xfff1d2, 1.55);
  sun.position.set(24, 34, 18);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far = 140;
  sun.shadow.camera.left = -45; sun.shadow.camera.right = 45;
  sun.shadow.camera.top = 45; sun.shadow.camera.bottom = -45;
  sun.shadow.bias = -0.0004;
  sun.target.position.set(2, 0, 3);
  scene.add(sun); scene.add(sun.target);
  const moonFill = new THREE.DirectionalLight(0x9fb8ff, 0.0);
  moonFill.position.set(-18, 22, -14);
  scene.add(moonFill);

  // ---------- Helpers ----------
  function box(w,h,d,color,o){
    o = o||{};
    const mat = new THREE.MeshStandardMaterial({
      color:color,
      metalness:o.metalness!=null?o.metalness:0.0,
      roughness:o.roughness!=null?o.roughness:0.9,
      transparent:!!o.transparent,
      opacity:o.opacity!=null?o.opacity:1,
      emissive:o.emissive!=null?o.emissive:0x000000,
      emissiveIntensity:o.emissiveIntensity!=null?o.emissiveIntensity:1,
      flatShading:!!o.flat
    });
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
    m.position.set(o.x||0,o.y||0,o.z||0);
    if(o.rotY) m.rotation.y=o.rotY;
    m.castShadow = o.cast!==false;
    m.receiveShadow = o.receive!==false;
    scene.add(m);
    return m;
  }

  const glassMats = [];
  function glass(w,h,d,o){
    o=o||{};
    const mat = new THREE.MeshStandardMaterial({
      color:0x92c7e8, metalness:0.35, roughness:0.08,
      transparent:true, opacity:0.42, emissive:0x0a1a26, emissiveIntensity:0.0
    });
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
    m.position.set(o.x||0,o.y||0,o.z||0);
    m.castShadow=false; m.receiveShadow=false;
    scene.add(m); glassMats.push(mat); return m;
  }

  function tree(x,z,s){
    s = s||1;
    const g = new THREE.Group();
    const trunkMat = new THREE.MeshStandardMaterial({color:0x6b4a2f, roughness:1});
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.18*s,0.26*s,1.7*s,7), trunkMat);
    trunk.position.y = 0.85*s; trunk.castShadow=true; g.add(trunk);
    const folMat = new THREE.MeshStandardMaterial({color:0x3f7d46, roughness:0.95, flatShading:true});
    const folMat2 = new THREE.MeshStandardMaterial({color:0x4f9354, roughness:0.95, flatShading:true});
    const balls = [
      {r:1.15*s,y:2.1*s,x:0,z:0,m:folMat},
      {r:0.85*s,y:2.8*s,x:0.5*s,z:0.3*s,m:folMat2},
      {r:0.8*s,y:2.7*s,x:-0.55*s,z:-0.2*s,m:folMat2},
      {r:0.7*s,y:3.3*s,x:0.05*s,z:-0.1*s,m:folMat}
    ];
    balls.forEach(b=>{
      const mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(b.r,0), b.m);
      mesh.position.set(b.x,b.y,b.z); mesh.castShadow=true; mesh.receiveShadow=true;
      g.add(mesh);
    });
    g.position.set(x,0,z);
    scene.add(g); return g;
  }

  function bush(x,z,s){
    s=s||1;
    const m = new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.55*s,0),
      new THREE.MeshStandardMaterial({color:0x4a8a4f, roughness:1, flatShading:true})
    );
    m.position.set(x,0.4*s,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
  }

  // ---------- Ground ----------
  const grass = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color:0x4c7a37, roughness:1})
  );
  grass.rotation.x = -Math.PI/2; grass.receiveShadow = true; scene.add(grass);

  // Paved patio in front
  box(30, 0.14, 12, 0xcfc8ba, {x:2, y:0.07, z:9.5, cast:false});
  // Stone path to street
  box(3, 0.13, 14, 0xbcb4a4, {x:0, y:0.075, z:20, cast:false});

  // ---------- MAIN BLOCK ----------
  box(12, 3.2, 8, 0xf1ebe0, {x:0, y:1.6, z:0});               // walls (cream stucco)
  box(12.3, 0.5, 8.3, 0xe8e0d2, {x:0, y:3.1, z:0});           // wall top trim
  box(13.2, 0.34, 9.2, 0x353a40, {x:0, y:3.45, z:0.1});       // flat roof slab w/ overhang
  box(2.2, 0.5, 1.6, 0x2b2f34, {x:-3.5, y:3.7, z:-1.5, cast:true}); // rooftop unit

  // Wood accent band under roof (front)
  box(12.1, 0.55, 0.15, 0x8a5a34, {x:0, y:2.95, z:4.05});

  // ---------- WOOD-CLAD WING (L shape, juts forward) ----------
  box(4.6, 3.0, 7, 0x9a6338, {x:7.8, y:1.5, z:3.4});          // wing (wood)
  box(4.9, 0.32, 7.4, 0x353a40, {x:7.8, y:3.16, z:3.4});      // wing roof
  // vertical wood battens on wing front
  for(let i=0;i<7;i++){
    box(0.12, 2.6, 0.12, 0x7a4f2c, {x:6.0+i*0.62, y:1.5, z:6.95});
  }

  // ---------- Front glazing (main block, faces +z) ----------
  glass(3.6, 2.5, 0.12, {x:-3.6, y:1.75, z:4.06});
  glass(2.7, 2.5, 0.12, {x:2.4, y:1.75, z:4.06});
  // window frames / mullions
  box(0.1, 2.6, 0.16, 0x2c2f33, {x:-3.6, y:1.75, z:4.09, cast:false, receive:false});
  box(3.9, 0.12, 0.16, 0x2c2f33, {x:-3.6, y:3.0, z:4.09, cast:false, receive:false});
  box(3.9, 0.12, 0.16, 0x2c2f33, {x:-3.6, y:0.5, z:4.09, cast:false, receive:false});
  box(0.1, 2.6, 0.16, 0x2c2f33, {x:2.4, y:1.75, z:4.09, cast:false, receive:false});

  // Side glazing (left face -x)
  glass(0.12, 2.2, 3.2, {x:-6.06, y:1.7, z:-0.5});

  // ---------- Entrance ----------
  box(1.5, 2.5, 0.16, 0x5b3b22, {x:-0.2, y:1.25, z:4.08});    // wooden door
  box(0.12, 2.5, 0.18, 0xc9a24a, {x:-0.95, y:1.25, z:4.12, cast:false}); // gold trim
  box(3.0, 0.22, 1.4, 0xd9d2c4, {x:-0.2, y:0.11, z:5.0, cast:false});    // step
  // canopy over door
  box(3.2, 0.16, 1.8, 0x2f3338, {x:-0.2, y:2.75, z:5.0});

  // ---------- Planters along facade ----------
  for(let i=0;i<4;i++){
    box(1.1,0.5,0.7, 0x8d8577, {x:-4.5+i*3.1, y:0.25, z:5.6, cast:true});
    bush(-4.5+i*3.1, 5.6, 0.7);
  }

  // ---------- Pergola / terrace (in the L crook) ----------
  (function pergola(){
    const px=1.5, pz=8.6, w=6, d=4.4;
    const posts=[[-w/2,-d/2],[w/2,-d/2],[-w/2,d/2],[w/2,d/2]];
    posts.forEach(p=> box(0.22,3,0.22,0x7a4f2c,{x:px+p[0],y:1.5,z:pz+p[1]}));
    box(w+0.4,0.16,0.2,0x7a4f2c,{x:px,y:3.0,z:pz-d/2});
    box(w+0.4,0.16,0.2,0x7a4f2c,{x:px,y:3.0,z:pz+d/2});
    for(let i=0;i<9;i++){ box(0.12,0.14,d+0.4,0x8a5a34,{x:px-w/2+i*(w/8),y:3.1,z:pz,cast:true}); }
    // deck
    box(w+1,0.12,d+1,0x9a6b3f,{x:px,y:0.09,z:pz,cast:false});
  })();

  // ---------- Swimming pool (front-left) ----------
  box(7.4, 0.4, 5.4, 0xdad3c4, {x:-6.5, y:0.16, z:9.5, cast:false});   // pool rim/coping
  const water = box(6.4, 0.28, 4.4, 0x2f8fc4, {x:-6.5, y:0.28, z:9.5, cast:false, receive:false,
                    metalness:0.15, roughness:0.12, transparent:true, opacity:0.82, emissive:0x0d4b6b, emissiveIntensity:0.35});
  // sun loungers
  box(0.7,0.18,1.9,0xf3efe6,{x:-9.6,y:0.3,z:8.4});
  box(0.7,0.18,1.9,0xf3efe6,{x:-9.6,y:0.3,z:10.4});

  // ---------- Low boundary wall (back) ----------
  box(34,1.3,0.4, 0xe4ddcf, {x:2, y:0.65, z:-9});
  box(0.4,1.3,20, 0xe4ddcf, {x:-15, y:0.65, z:0});

  // ---------- Landscaping ----------
  tree(-13,-4,1.2); tree(14,-3,1.0); tree(-14,12,1.3); tree(13,14,1.1);
  tree(-11,18,0.9); tree(11,-7,1.0); tree(6,17,0.85);
  bush(-11,2,1.1); bush(11,4,1.0); bush(-9,13,0.9); bush(9,11,0.9);

  // ================= CAMERA CONTROLS (custom orbit) =================
  const target = new THREE.Vector3(1.5, 1.4, 3.5);
  const HOME = { radius:34, theta:0.9, phi:1.05 };
  let radius = HOME.radius, theta = HOME.theta, phi = HOME.phi;
  let autoRotate = true;
  let dragging = false, lastX=0, lastY=0;

  function applyCamera(){
    const sinPhi = Math.sin(phi);
    camera.position.set(
      target.x + radius*sinPhi*Math.cos(theta),
      target.y + radius*Math.cos(phi),
      target.z + radius*sinPhi*Math.sin(theta)
    );
    camera.lookAt(target);
  }

  const el = renderer.domElement;
  el.addEventListener('pointerdown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; el.setPointerCapture(e.pointerId); });
  el.addEventListener('pointerup',   e=>{ dragging=false; });
  el.addEventListener('pointerleave',()=>{ dragging=false; });
  el.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const dx=e.clientX-lastX, dy=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY;
    theta -= dx*0.005;
    phi   -= dy*0.005;
    phi = Math.max(0.18, Math.min(1.45, phi));
  });
  el.addEventListener('wheel', e=>{
    e.preventDefault();
    radius *= (1 + e.deltaY*0.0011);
    radius = Math.max(10, Math.min(70, radius));
  }, {passive:false});

  // ================= UI Buttons =================
  const btnRotate = document.getElementById('btnRotate');
  const btnTime = document.getElementById('btnTime');
  const btnReset = document.getElementById('btnReset');
  btnRotate.addEventListener('click', ()=>{
    autoRotate = !autoRotate;
    btnRotate.classList.toggle('active', autoRotate);
  });
  btnReset.addEventListener('click', ()=>{
    radius=HOME.radius; theta=HOME.theta; phi=HOME.phi;
  });

  let night=false;
  function setTime(toNight){
    night = toNight;
    if(night){
      btnTime.textContent = "🌙 Gece";
      scene.background.copy(NIGHT_BG); scene.fog.color.copy(NIGHT_BG);
      hemi.intensity=0.25; hemi.color.setHex(0x2a3a5a); hemi.groundColor.setHex(0x101828);
      sun.intensity=0.12; sun.color.setHex(0x7f93c8);
      moonFill.intensity=0.35;
      glassMats.forEach(m=>{ m.emissive.setHex(0xffcf7a); m.emissiveIntensity=0.9; m.opacity=0.6; });
      water.material.emissive.setHex(0x0a2c44); water.material.emissiveIntensity=0.6;
      renderer.toneMappingExposure=1.15;
    } else {
      btnTime.textContent = "☀️ Gündüz";
      scene.background.copy(DAY_BG); scene.fog.color.copy(DAY_BG);
      hemi.intensity=0.5; hemi.color.setHex(0xc4d8ec); hemi.groundColor.setHex(0x47603c);
      sun.intensity=1.55; sun.color.setHex(0xfff1d2);
      moonFill.intensity=0.0;
      glassMats.forEach(m=>{ m.emissive.setHex(0x0a1a26); m.emissiveIntensity=0.0; m.opacity=0.42; });
      water.material.emissive.setHex(0x0d4b6b); water.material.emissiveIntensity=0.35;
      renderer.toneMappingExposure=0.95;
    }
  }
  btnTime.addEventListener('click', ()=> setTime(!night));

  // ================= Resize & Loop =================
  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  let t=0;
  function animate(){
    requestAnimationFrame(animate);
    t += 0.016;
    if(autoRotate && !dragging) theta += 0.0016;
    // gentle water shimmer
    water.position.y = 0.28 + Math.sin(t*1.6)*0.012;
    water.material.emissiveIntensity = (night?0.55:0.3) + Math.sin(t*2.0)*0.06;
    applyCamera();
    renderer.render(scene, camera);
  }
  applyCamera();
  animate();
  if(loading) loading.style.display='none';
})();
</script>
</body>
</html>
